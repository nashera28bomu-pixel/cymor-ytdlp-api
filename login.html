<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================================
       META
    ========================================== -->

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <meta
        name="description"
        content="Login to Cymor Code Learner and continue your coding journey." />

    <title>Login • Cymor Code Learner</title>

    <!-- =========================================
       GOOGLE FONTS
    ========================================== -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- =========================================
       STYLES
    ========================================== -->

    <link rel="stylesheet"
        href="styles.css">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                radial-gradient(circle at top left,
                    rgba(0, 245, 255, 0.15),
                    transparent 30%),

                radial-gradient(circle at bottom right,
                    rgba(139, 92, 246, 0.18),
                    transparent 30%),

                #050816;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background:
                rgba(255, 255, 255, 0.05);

            border:
                1px solid rgba(255, 255, 255, 0.08);

            border-radius: 28px;

            padding: 45px;

            backdrop-filter: blur(20px);

            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .auth-logo p {
            color: #94a3b8;
        }

        .gradient-text {
            background:
                linear-gradient(135deg,
                    #00f5ff,
                    #8b5cf6);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: white;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px;

            border-radius: 16px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

            background:
                rgba(255, 255, 255, 0.04);

            color: white;

            font-size: 1rem;

            outline: none;

            transition: 0.3s ease;
        }

        .form-input:focus {
            border-color: #00f5ff;
            box-shadow:
                0 0 0 4px rgba(0, 245, 255, 0.12);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .auth-btn {
            width: 100%;

            border: none;

            padding: 16px;

            border-radius: 16px;

            background:
                linear-gradient(135deg,
                    #00f5ff,
                    #8b5cf6);

            color: black;

            font-weight: 700;

            font-size: 1rem;

            cursor: pointer;

            transition: 0.3s ease;
        }

        .auth-btn:hover {
            transform: translateY(-4px);

            box-shadow:
                0 12px 25px rgba(0, 245, 255, 0.25);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;

            margin: 30px 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background:
                rgba(255, 255, 255, 0.08);
        }

        .google-btn {
            width: 100%;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;

            padding: 15px;

            border-radius: 16px;

            border:
                1px solid rgba(255, 255, 255, 0.1);

            background:
                rgba(255, 255, 255, 0.04);

            color: white;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s ease;
        }

        .google-btn:hover {
            background:
                rgba(255, 255, 255, 0.08);

            transform: translateY(-3px);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            color: #94a3b8;
        }

        .auth-footer a {
            color: #00f5ff;
            text-decoration: none;
            font-weight: 600;
        }

        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;

            border-radius: 50%;

            filter: blur(90px);

            opacity: 0.25;

            z-index: 1;
        }

        .glow-1 {
            background: #00f5ff;
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            background: #8b5cf6;
            bottom: -100px;
            right: -100px;
        }

        @media (max-width: 600px) {

            .auth-card {
                padding: 35px 25px;
            }

            .auth-logo h1 {
                font-size: 1.7rem;
            }
        }
    </style>

</head>

<body>

    <!-- GLOWS -->

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <!-- AUTH -->

    <div class="auth-wrapper">

        <div class="auth-card">

            <!-- LOGO -->

            <div class="auth-logo">

                <h1 class="gradient-text">
                    🚀 Cymor Code Learner
                </h1>

                <p>
                    Welcome back developer
                </p>

            </div>

            <!-- FORM -->

            <form id="loginForm">

                <div class="form-group">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="loginEmail"
                        class="form-input"
                        placeholder="developer@example.com"
                        required>

                </div>

                <div class="form-group">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        id="loginPassword"
                        class="form-input"
                        placeholder="Enter your password"
                        required>

                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Login To Dashboard 🚀

                </button>

            </form>

            <!-- DIVIDER -->

            <div class="divider">
                OR CONTINUE WITH
            </div>

            <!-- GOOGLE -->

            <button
                id="googleLoginBtn"
                class="google-btn">

                <img
                    src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                    alt="Google Logo">

                Continue with Google

            </button>

            <!-- FOOTER -->

            <div class="auth-footer">

                Don’t have an account?

                <a href="register.html">
                    Create One
                </a>

            </div>

        </div>

    </div>

</body>

  </html>
