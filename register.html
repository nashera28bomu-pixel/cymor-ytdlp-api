<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create your Cymor Code Learner account and start learning coding interactively." />
    <title>Register • Cymor Code Learner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, rgba(0, 245, 255, 0.15), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.18), transparent 30%),
                        #050816;
            color: white;
            overflow-x: hidden;
        }

        .register-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .register-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #00f5ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #cbd5e1; }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: white;
            font-size: 0.95rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #00f5ff;
            background: rgba(255, 255, 255, 0.08);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00f5ff, #8b5cf6);
            color: #050816;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 25px 0; color: #64748b; font-size: 0.8rem; letter-spacing: 1px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .google-btn {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .google-btn:hover { background: rgba(255,255,255,0.1); }
        .google-btn img { width: 20px; }

        .register-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #94a3b8; }
        .register-footer a { color: #00f5ff; text-decoration: none; font-weight: 600; }

        /* Loader Overlay */
        #authLoader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(5, 8, 22, 0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        #authLoader.active { display: flex; }
        .loader-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(0, 245, 255, 0.3);
            border-top: 3px solid #00f5ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toast Message */
        .auth-message {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            border-radius: 12px; z-index: 2000; display: none;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .auth-message.error { background: #ef4444; color: white; }
        .auth-message.success { background: #10b981; color: white; }
    </style>
</head>
<body>

    <div id="authLoader"></div>
    <div id="authMessage" class="auth-message"></div>

    <div class="register-wrapper">
        <div class="register-card">
            <div class="register-logo">
                <h1 class="gradient-text">🚀 Cymor Code Learner</h1>
                <p>Start your coding journey today</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="registerName" class="form-input" placeholder="Legendary Developer" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="dev@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="register-btn">Create Account 🚀</button>
            </form>

            <div class="divider">OR CONTINUE WITH</div>

            <button id="googleRegisterBtn" class="google-btn google-signin-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Sign up with Google
            </button>

            <div class="register-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="auth.js" type="module"></script>
</body>
</html>
